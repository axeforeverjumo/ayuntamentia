services:
  # === Redis (message broker for Celery) ===
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data

  # === Pipeline Worker (Celery) ===
  pipeline-worker:
    build: ./pipeline
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    network_mode: host
    environment:
      - OPENCLAW_BASE_URL=http://localhost:10531/v1
      - DATABASE_URL=postgresql://postgres:PrLaCXPsZIAIkX25ZXQAC5E54LRo90uU@172.19.0.4:5432/postgres
      - REDIS_URL=redis://localhost:6380/0
    volumes:
      - pdf-storage:/data/pdfs
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=4

  # === Pipeline Beat (Scheduler) ===
  pipeline-beat:
    build: ./pipeline
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    network_mode: host
    environment:
      - REDIS_URL=redis://localhost:6380/0
    command: celery -A src.workers.celery_app beat --loglevel=info

  # === API (FastAPI) ===
  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    network_mode: host
    environment:
      - OPENCLAW_BASE_URL=http://localhost:10531/v1
      - DATABASE_URL=postgresql://postgres:PrLaCXPsZIAIkX25ZXQAC5E54LRo90uU@172.19.0.4:5432/postgres
      - REDIS_URL=redis://localhost:6380/0
      - CLIENT_PARTIDO=${CLIENT_PARTIDO:-AC}
      - CLIENT_NOMBRE=${CLIENT_NOMBRE:-Aliança Catalana}
      - CLIENT_RIVALES=${CLIENT_RIVALES:-}

  # === Telegram Bot ===
  telegram:
    build: ./telegram
    restart: unless-stopped
    env_file: .env
    network_mode: host
    environment:
      - API_URL=http://localhost:8050
      - CLIENT_PARTIDO=${CLIENT_PARTIDO:-AC}
      - CLIENT_NOMBRE=${CLIENT_NOMBRE:-Aliança Catalana}

  # === Web (Next.js) ===
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://85.215.105.45:8050}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_CLIENT_PARTIDO: ${CLIENT_PARTIDO:-AC}
        NEXT_PUBLIC_CLIENT_NOMBRE: ${CLIENT_NOMBRE:-Aliança Catalana}
        NEXT_PUBLIC_CLIENT_RIVALES: ${CLIENT_RIVALES:-}
    restart: unless-stopped
    ports:
      - "3100:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://85.215.105.45:8050}
      - NEXT_PUBLIC_CLIENT_PARTIDO=${CLIENT_PARTIDO:-AC}
      - NEXT_PUBLIC_CLIENT_NOMBRE=${CLIENT_NOMBRE:-Aliança Catalana}
    depends_on:
      - api

volumes:
  redis-data:
  pdf-storage:

networks:
  default:
    name: supabase_default
    external: true
