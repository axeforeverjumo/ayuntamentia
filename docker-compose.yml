services:
  # === Redis (message broker for Celery) ===
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data

  # === Pipeline Worker (Celery) ===
  pipeline-worker:
    build: ./pipeline
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - pdf-storage:/data/pdfs
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=4

  # === Pipeline Beat (Scheduler) ===
  pipeline-beat:
    build: ./pipeline
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: celery -A src.workers.celery_app beat --loglevel=info

  # === API (FastAPI) ===
  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8050:8050"
    depends_on:
      - redis

  # === Telegram Bot ===
  telegram:
    build: ./telegram
    restart: unless-stopped
    env_file: .env
    environment:
      - API_URL=http://api:8050
    depends_on:
      - api

  # === Web (Next.js) ===
  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8050
    depends_on:
      - api

volumes:
  redis-data:
  pdf-storage:

networks:
  default:
    name: supabase_default
    external: true
